name: Bug report
description: Report a reproducible bug in MP5 Audio Public Beta (not a security vulnerability)
title: "[Bug]: "
labels: ["bug", "beta"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve MP5 Audio **Public Beta**. MP5 is **experimental** and browser-based.
        For **security issues**, do **not** use this form — see [SECURITY.md](https://github.com/cjocollin/MP5-audio/blob/main/SECURITY.md).
        **Privacy:** Do not upload copyrighted or private audio unless you have rights and choose to share it.

  - type: input
    id: mp5_version
    attributes:
      label: MP5 version
      description: From app badge or Settings → Diagnostics → Copy diagnostics
      placeholder: v0.16.2-beta
    validations:
      required: true

  - type: dropdown
    id: mp5_mode
    attributes:
      label: MP5 mode used
      options:
        - MP5-L v3 (recommended lossless)
        - PCM (reference / fallback)
        - MP5-C (experimental lab)
        - MP5-H (experimental hybrid)
        - Unknown / not applicable
    validations:
      required: true

  - type: input
    id: os_browser
    attributes:
      label: OS / browser
      description: e.g. Windows 11 + Chrome 136, iPhone Safari 18, Node-only CLI
      placeholder: Windows 11, Chrome 136
    validations:
      required: true

  - type: dropdown
    id: file_type
    attributes:
      label: File type
      options:
        - ".mp5 single track"
        - ".mp5p album package"
        - WAV / FLAC / MP3 / M4A / OGG import
        - None / UI only
        - Other
    validations:
      required: true

  - type: input
    id: versions
    attributes:
      label: Node / Rust versions (if CLI or dev setup)
      placeholder: Node 22.14, Rust 1.86, pnpm 9.15
    validations:
      required: false

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction steps
      description: Numbered steps; include hosted URL or commands when applicable
      placeholder: |
        1. Open https://mp5-audio.vercel.app → Demo guide → Load MP5-L demo
        2. ...
    validations:
      required: true

  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics paste (optional)
      description: Settings → Diagnostics → Copy diagnostics. Redact filenames if needed.
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Screenshots / console logs (optional)
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues for duplicates
          required: true
        - label: I pasted diagnostics from Settings if available
          required: false
        - label: I am not reporting a security vulnerability publicly
          required: true
        - label: I did not attach copyrighted/private audio I do not have rights to share
          required: true
